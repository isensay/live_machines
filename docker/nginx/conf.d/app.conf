server {
    listen 80;
    server_name localhost;
    root /var/www/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # Проксирование реального IP
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Передача реального IP
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;

        # Увеличение времени ожидания ответа от PHP
        fastcgi_read_timeout 300;  # Время ожидания ответа от PHP (в секундах)
        fastcgi_connect_timeout 300;  # Время ожидания соединения с PHP
        fastcgi_send_timeout 300;  # Время ожидания отправки данных PHP
        
        # Дополнительные параметры для долгих запросов
        proxy_read_timeout 300;  # Только если используется проксирование
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}